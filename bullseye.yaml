schema_version: 3
targets:
  T1:
    name: Vellum exposes a working MCP server over stdio
    status: achieved
    value: 13.0
    cost: 5.0
    actual_cost: 3.0
    acceptance:
    - '`vellum --mcp` starts a stdio MCP server without error'
    - 'Server exposes a `convert` tool whose schema matches mpe2pdf''s `{files: [{input, output?}]}`'
    - Invoking the tool with a sample markdown file produces a PDF at the specified path
    - Server logs go to stderr only (stdout reserved for JSON-RPC)
    - Manual smoke test via Claude Code `.mcp.json` configuration succeeds
    context: 'The stated product vision for vellum is an MCP-first document preparation server for AI agents. The CLI already works end-to-end, but `--mcp` is currently stubbed with `return fmt.Errorf("MCP server not yet implemented")` in cmd/vellum/main.go, and the mcp/ directory is empty. Implementation path: use github.com/modelcontextprotocol/go-sdk (official SDK), wire `mcp.NewServer` → `mcp.AddTool` → `server.Run(StdioTransport{})`, and reuse `convert.Convert()`. This is the single highest-value outstanding feature.'
    tags:
    - feature
    - mcp
    origin: handover-doc-roadmap
    discovered: 2026-04-11
    achieved: 2026-04-11
  T2:
    name: Project has a README covering install, usage, and MCP configuration
    status: achieved
    value: 8.0
    cost: 2.0
    actual_cost: 1.0
    acceptance:
    - README.md exists at repo root
    - 'Covers: what vellum is, prerequisites (Prince, Node+katex, mmdc+Chromium), install paths (go install, Homebrew when available, binary download), CLI quick start, MCP server config block for Claude Code, feature list with at least one example, licence'
    - Links resolve (GitHub URLs use full form)
    context: No README exists yet. This blocks onboarding for anyone discovering the repo — including the user in a fresh session. Use mpe2pdf's README as a starting point but adapt for vellum's Go+MCP positioning.
    tags:
    - docs
    origin: handover-doc-roadmap
    discovered: 2026-04-11
    achieved: 2026-04-11
  T3:
    name: Vellum fails fast with clear errors when runtime dependencies are missing
    status: achieved
    value: 5.0
    cost: 2.0
    actual_cost: 2.0
    acceptance:
    - Startup (CLI convert or MCP server mode) checks for `prince`, `node`, `katex`, and `mmdc` on PATH
    - Missing dependency produces an actionable error naming the tool and the install command
    - Checks run before any conversion work begins, so failures surface at the top of the pipeline
    context: Currently a missing dependency produces a confusing error mid-pipeline (e.g. deep in Prince shell-out or Node exec). A `vellum doctor`-style preflight — or at minimum `exec.LookPath` calls at startup — gives users a clear onboarding error.
    tags:
    - ux
    - reliability
    origin: handover-doc-roadmap
    discovered: 2026-04-11
    achieved: 2026-04-11
  T4:
    name: Vellum has a Go test suite covering preprocessors and the full pipeline
    status: achieved
    value: 8.0
    cost: 3.0
    actual_cost: 2.0
    acceptance:
    - Unit tests for math preprocessor (including code-block protection and multi-line matrices)
    - Unit tests for mermaid preprocessor (including `<!-- vellum:scale N -->` hint)
    - Integration test that runs convert.Convert on a small markdown file and asserts the PDF exists, is non-empty, and contains expected text (via pdftotext or ledongthuc/pdf)
    - CLI tests for --help, --version, and missing-input error paths
    - '`go test ./...` passes locally and in CI'
    context: No Go tests exist. The preprocessors are pure string transforms and easy to unit-test; the full pipeline needs an integration test to catch regressions in rendering. Required before first release to give CI something meaningful to run.
    tags:
    - tests
    - quality
    origin: handover-doc-roadmap
    discovered: 2026-04-11
    achieved: 2026-04-11
  T5:
    name: Vellum ships an agent guide accessible via --help-agent
    status: achieved
    value: 5.0
    cost: 2.0
    actual_cost: 2.0
    acceptance:
    - '`docs/agents-guide.md` exists and is embedded via go:embed'
    - '`vellum --help-agent` prints usage plus the embedded agent guide'
    - 'Guide covers: what vellum does, MCP-preferred invocation, tool schema with example, input restrictions (absolute path, .md), the `<!-- vellum:scale N -->` hint, security notes on Prince JS'
    context: All marcelocantos CLI binaries are required to support `--help-agent`. This makes vellum self-describing for AI agents that discover it.
    tags:
    - docs
    - agent
    origin: global-cli-convention
    discovered: 2026-04-11
    achieved: 2026-04-11
  T6:
    name: Vellum v0.1.0 is released with CI-built binaries and a Homebrew formula
    status: achieved
    value: 8.0
    cost: 3.0
    actual_cost: 3.0
    acceptance:
    - '`.github/workflows/release.yml` builds macOS arm64, Linux x86_64, Linux arm64 tarballs on release events'
    - GitHub release v0.1.0 exists with attached binaries
    - '`marcelocantos/homebrew-tap` has a working `vellum` formula (via homebrew-releaser)'
    - '`brew install marcelocantos/tap/vellum` succeeds on a clean machine and `vellum --version` prints v0.1.0'
    - STABILITY.md exists cataloguing the CLI+MCP surface
    context: First public release. Depends on README, MCP server, tests, and agent guide being in place so the release is usable. Follow the pattern from mpe2pdf's release workflow; watch the homebrew-releaser gotchas (skip_checksum, explicit version, repo description).
    tags:
    - release
    - ci
    origin: handover-doc-roadmap
    discovered: 2026-04-11
    achieved: 2026-04-11
  T7:
    name: Convert can deliver output to the system clipboard with multiple type representations, suitable for pasting into rich-text composers (Slack, Mail, etc.) without formatting loss
    status: achieved
    value: 0.0
    cost: 0.0
    showcase: true
    demonstration: 'User pasted vellum-rendered Markdown (cert-renewal instructions sample) into Slack, Gmail, TextEdit, and VS Code after the v2 fix. Slack and Gmail rendered with full formatting (bold, numbered list, blockquote, code block, emoji); TextEdit accepted RTF cleanly; VS Code took plain text without the "unusual line terminators" dialog. First showcase round revealed two regressions (Slack rejected full HTML doc; VS Code flagged U+2028/U+2029); both fixed in c4ca2c1 and re-tested green. Merged as PR #7.'
    acceptance:
    - '`vellum convert <input> --to-clipboard` (and equivalent MCP tool invocation) places the converted content on the system clipboard with at least RTF, HTML, and plain-text representations set in a single atomic transaction.'
    - Pasting into Slack, Mail, and TextEdit immediately after the command returns produces correctly formatted output (bold, lists, blockquotes, links) without raw RTF source leaking through.
    - On macOS, the command does not return until NSPasteboard `changeCount` has advanced — no race window where Cmd+V pastes stale content.
    - Documented in vellum's docs with the failure modes of `pbcopy`/`osascript` it replaces, so agents and humans know when to reach for it.
    - macOS is the supported platform. Linux is explicitly out of scope. Windows is parked under 🎯T7.1 and may be picked up later; the package returns a typed unsupported error there in the meantime.
    context: |-
      Putting markdown-formatted content onto the macOS clipboard for paste into Slack/Mail today requires shelling out to `textutil` + `osascript` with `«class RTF »`, which has well-documented failure modes:

      1. **Single representation only**: `osascript` sets only the RTF type. Apps that prefer plain text fall back to the raw RTF source (`{\rtf1\ansi...`) and paste gibberish.
      2. **No commit confirmation**: AppleScript returns before the pasteboard daemon has actually committed the data. Combined with Universal Clipboard sync, this leaves a 30–60s window where Cmd+V silently does nothing or pastes the previous clipboard.
      3. **Lossy round-trip**: `pbpaste | pbcopy` strips rich types because `pbpaste` defaults to plain-text representation.

      vellum already does the conversion half (markdown → HTML). Adding clipboard as an output target ("convert + deliver") closes the loop natively rather than via fragile shell pipes. Encountered while drafting Slack instructions for a non-technical site owner — a common agent task.

      Implementation notes:
      - macOS: native NSPasteboard via cgo. NSAttributedString converts the assembled HTML to RTF in-process; plain text comes from the same NSAttributedString. Single `declareTypes`/`setData` transaction; NSPasteboard's API is synchronous so commit confirmation comes for free.
      - Linux: dropped as a target. Markdown-paste-to-Slack-on-Linux is not a workflow this project commits to support; users on Linux compose differently.
      - Windows: parked under 🎯T7.1 (CF_HTML, CF_UNICODETEXT, CF_RTF via SetClipboardData). The clipboard package returns a typed `ErrUnsupported` so non-macOS callers see a clear error rather than silent failure.
    tags:
    - mcp
    - clipboard
    - ux
    origin: forked-from stock-car-racing/Slack-instructions-for-cert-renewal session, 2026-04-25
    discovered: 2026-04-25
    achieved: 2026-04-26
  T7.1:
    name: Windows clipboard backend for `convert_to_clipboard` (CF_HTML, CF_UNICODETEXT, CF_RTF via SetClipboardData)
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: Parked. macOS is the supported platform; Windows is plausible but not a current need. Pick up when there's a concrete demand or a willing tester. Until then `clipboard.ErrUnsupported` is the clear error.
    acceptance:
    - '`clipboard.Write` on Windows places HTML, plain-text, and RTF representations on the system clipboard via SetClipboardData with CF_HTML, CF_UNICODETEXT, and the registered CF_RTF format.'
    - Pasting from the clipboard into a Windows rich-text target (Outlook / Word / WordPad) produces correctly formatted output, not raw RTF source or HTML markup.
    - Cross-compiling vellum from macOS to windows/amd64 still succeeds — the Windows backend uses syscall, not cgo, so CGO_ENABLED=0 builds are unaffected.
    context: |-
      Forked from 🎯T7 when scope was tightened to macOS only. Windows users are a plausible audience but not the project's primary target — landing this is worthwhile when there's a concrete demand or a willing tester. Until then the package returns `ErrUnsupported` on Windows so the error is loud rather than silent.

      Implementation sketch: use `golang.org/x/sys/windows` to call `OpenClipboard`, `EmptyClipboard`, `SetClipboardData`, `CloseClipboard`. CF_HTML wants the prefix-header format documented at https://learn.microsoft.com/en-us/windows/win32/dataxchg/html-clipboard-format. CF_RTF is a registered format obtained via `RegisterClipboardFormat("Rich Text Format")`. Plain text is UTF-16 LE under CF_UNICODETEXT.

      The HTML→RTF conversion that NSAttributedString does for free on macOS has no Win32 equivalent — either ship without RTF (CF_HTML alone covers Outlook/Word) or pull in a Go HTML→RTF library.
    tags:
    - clipboard
    - windows
    - platform
    origin: forked-from 🎯T7 when Linux was dropped and Windows parked, 2026-04-25
    discovered: 2026-04-25
  T8:
    name: Homebrew formula declares runtime tool deps and sets service-block PATH so the launchd-spawned vellum daemon resolves node, mmdc, and prince without manual setup
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Formula's `service do` block sets `environment_variables PATH:` to `"/opt/homebrew/bin:/opt/homebrew/sbin:#{Dir.home}/.cargo/bin:#{Dir.home}/.local/bin:#{Dir.home}/.py/bin:#{Dir.home}/go/bin:/usr/bin:/bin:/usr/sbin:/sbin"`
    - Formula declares `depends_on "node"` and `depends_on "mermaid-cli"`
    - Prince stays a documented manual install (not in Homebrew); the service-block PATH includes `/usr/local/bin` (default Prince install location) — verify it's covered or add to PATH
    - '`convert/deps.go:51` LookPath-then-fail code is reviewed; if redundant after the formula fix lands, remove it. If kept, document why (e.g., for non-Homebrew install paths)'
    - '`brew services restart vellum` followed by a Markdown-to-PDF conversion exercising KaTeX (node) and Mermaid (mmdc) succeeds with no manual PATH workaround'
    context: |-
      Background: launchd-spawned MCP daemons (started via `brew services`) inherit a minimal PATH (`/usr/bin:/bin:/usr/sbin:/sbin`). Any external tool the daemon shells out to that lives in `/opt/homebrew/bin`, `~/.cargo/bin`, `~/.local/bin`, `~/.py/bin`, or `~/go/bin` fails to resolve at runtime. Spyder hit this first (with pmd3) and is already fixed via a different mechanism (bundled binary). The cross-repo fix design decision was made in ~/think on 2026-04-27.

      Design decision — fix at the Homebrew formula's `service` block, NOT:
      - in code (per-server PATH augmentation): buries the fix far from the daemon's environment config.
      - via global `launchctl setenv PATH`: pollutes user-domain environment for every GUI app.
      - via wrapper script: `brew services` is what spawns the daemon; wrapping the launch belongs in the formula.

      Reasons the formula's `service` block is correct:
      - Per-daemon scope, no collateral.
      - `brew services` regenerates the launchd plist from the formula on install/upgrade/restart, so the fix survives upgrades.
      - No code change in the server.
      - `depends_on` makes `brew install vellum` self-sufficient (modulo Prince).

      Audit findings for vellum (from ~/think investigation 2026-04-27):
      - `convert/convert.go:203` — calls `prince` (NOT in Homebrew; manual install, lives in `/usr/local/bin/prince` typically. Service-block PATH should include `/usr/local/bin` — already does in the template above).
      - `convert/katex.go:160` — calls `node` (homebrew)
      - `convert/mermaid.go:107` — calls `mmdc` (homebrew via `mermaid-cli`)
      - `convert/deps.go:51` — does `LookPath` for advertised deps and fails cleanly with a useful error. Review whether this still adds value once the formula fix lands; it may still be useful for users running outside the launchd path (e.g., CLI invocation), in which case keep it but document the rationale.

      Tools available in Homebrew (verified 2026-04-27): `node`, `mermaid-cli` (provides `mmdc`).

      Tools NOT in Homebrew, kept as service-block-PATH expectations: `prince` (manual install from princexml.com — has no Homebrew formula and shouldn't gain one). The default install path `/usr/local/bin` is already in the template service-block PATH. If Prince is installed elsewhere on Marcelo's machine, verify and adjust.

      Formula shape (template):
      ```ruby
      depends_on "node"
      depends_on "mermaid-cli"
      # prince: manual install required (caveats can document this)

      service do
        run [opt_bin/"vellum"]
        environment_variables PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:#{Dir.home}/.cargo/bin:#{Dir.home}/.local/bin:#{Dir.home}/.py/bin:#{Dir.home}/go/bin:/usr/bin:/bin:/usr/sbin:/sbin"
        keep_alive true
        log_path var/"log/vellum.log"
        error_log_path var/"log/vellum.log"
      end
      ```

      Note `/usr/local/bin` is included for Prince. The other sibling formulas (mnemo, sawmill) don't need it, but having it everywhere is harmless and may be worth standardising.

      Sibling targets exist on mnemo and sawmill repos with the same design context. If a shared PATH constant is later defined in the tap, refactor to reference it.
    origin: forked-from spyder PATH-bug investigation in ~/think on 2026-04-27
    discovered: 2026-04-27
    achieved: 2026-04-27
