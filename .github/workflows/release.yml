name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test (preprocessor + CLI unit tests only; pipeline test is skipped without Prince)
        run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_os: darwin
            asset_arch: arm64
            cgo: '1'
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_os: linux
            asset_arch: amd64
            cgo: '0'
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset_os: linux
            asset_arch: arm64
            cgo: '0'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/vellum ./cmd/vellum
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="vellum-${VERSION}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz"
          tar -czf "${ASSET}" -C dist vellum -C .. LICENSE README.md
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${ASSET}" --clobber

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: |
            bin.install "vellum" => "vellum-bin"
            (bin/"vellum").write <<~SH
              #!/bin/sh
              # Prepend the canonical tool dirs so node, mmdc, and prince
              # resolve regardless of how vellum is launched (terminal,
              # MCP client with a stripped PATH inherited from launchd, …).
              export PATH="#{HOMEBREW_PREFIX}/bin:#{HOMEBREW_PREFIX}/sbin:/usr/local/bin:$HOME/.cargo/bin:$HOME/.local/bin:$HOME/.py/bin:$HOME/go/bin:$PATH"
              exec "#{opt_bin}/vellum-bin" "$@"
            SH
            (bin/"vellum").chmod 0755
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"vellum", "--version"'
          skip_checksum: true
          update_readme_table: true
          formula_includes: |
            depends_on "mermaid-cli"
            depends_on "node"
            depends_on "pandoc"
            depends_on "weasyprint"

            def caveats
              <<~EOS
                vellum is installed with WeasyPrint as the default renderer (BSD-3, open-source).

                To opt into Prince (proprietary, slightly better typography), either:
                  - install it from https://www.princexml.com/download/ (free with watermark
                    for non-commercial use; commercial licence required otherwise), and
                  - set "backend: prince" in ~/.config/vellum/config.yaml, or pass
                    --backend prince on the CLI, or supply "backend": "prince" in an
                    MCP tool call.

                KaTeX is needed for math rendering:
                  npm install -g katex

                Pandoc handles the inverse direction (rich-text → Markdown via
                `vellum import` and the `convert_from_clipboard` MCP tool); it is
                included as a dependency.
              EOS
            end
